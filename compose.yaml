services:
  postgres:
    image: postgres:16-alpine
    container_name: god-postgres
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-god}
      POSTGRES_USER: ${POSTGRES_USER:-god}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-god}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-god} -d ${POSTGRES_DB:-god}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
