name: Deploy server-axum

on:
  push:
    branches:
      - main
    paths:
      - apps/server-axum/**
      - .github/workflows/deploy-axum.yml
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: deploy-server-axum-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: god
          POSTGRES_USER: god
          POSTGRES_PASSWORD: god
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U god -d god"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    environment: production
    env:
      API_SERVER_BASE_URL: http://localhost:3000
      AUTH_COOKIE_SECURE: "false"
      AXUM_PORT: "3000"
      CONTAINER_NAME: server-axum
      DATABASE_URL: postgres://god:god@127.0.0.1:5432/god
      FRONTEND_ORIGIN: http://localhost:4321
      HOST_PORT: "80"
      PUBLIC_API_BASE_URL: http://localhost:3000

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy,rustfmt

      - name: Cache Cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            apps/server-axum/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('apps/server-axum/Cargo.lock') }}

      - name: Verify backend quality gates
        working-directory: apps/server-axum
        run: |
          cargo fmt --all --check
          cargo clippy --locked --all-targets --all-features -- -D warnings
          cargo run --locked -- migrate
          cargo test --locked

      - name: Compute image coordinates
        id: vars
        shell: bash
        run: |
          IMAGE_REPO="ghcr.io/${GITHUB_REPOSITORY,,}/server-axum"
          echo "image_repo=$IMAGE_REPO" >> "$GITHUB_OUTPUT"
          echo "sha_tag=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR (push)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ./apps/server-axum
          file: ./apps/server-axum/Dockerfile
          push: true
          tags: |
            ${{ steps.vars.outputs.image_repo }}:${{ steps.vars.outputs.sha_tag }}
            ${{ steps.vars.outputs.image_repo }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

      - name: Deploy to Hetzner VPS via SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          IMAGE_REPO: ${{ steps.vars.outputs.image_repo }}
          IMAGE_TAG: ${{ steps.vars.outputs.sha_tag }}
          CONTAINER_NAME: ${{ env.CONTAINER_NAME }}
          HOST_PORT: ${{ env.HOST_PORT }}
          AXUM_PORT: ${{ env.AXUM_PORT }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_PAT: ${{ secrets.GHCR_PAT }}
          SERVER_ENV_FILE: ${{ secrets.SERVER_ENV_FILE }}
        with:
          host: ${{ vars.VPS_HOST }}
          username: ${{ vars.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          passphrase: ${{ secrets.VPS_SSH_PASSPHRASE }}
          script_stop: true
          envs: IMAGE_REPO,IMAGE_TAG,CONTAINER_NAME,HOST_PORT,AXUM_PORT,GHCR_USERNAME,GHCR_PAT,SERVER_ENV_FILE
          script: |
            set -euo pipefail

            sudo mkdir -p /opt/server-axum
            printf '%s\n' "$SERVER_ENV_FILE" | sudo tee /opt/server-axum/.env >/dev/null

            echo "$GHCR_PAT" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin
            docker pull "$IMAGE_REPO:$IMAGE_TAG"

            docker rm -f "$CONTAINER_NAME" || true

            docker run -d \
              --name "$CONTAINER_NAME" \
              --restart unless-stopped \
              --env-file /opt/server-axum/.env \
              -p "$HOST_PORT:$AXUM_PORT" \
              "$IMAGE_REPO:$IMAGE_TAG"

            for attempt in $(seq 1 20); do
              status=$(docker inspect --format='{{if .State.Health}}{{.State.Health.Status}}{{else}}starting{{end}}' "$CONTAINER_NAME")
              if [ "$status" = "healthy" ]; then
                exit 0
              fi
              sleep 3
            done

            docker logs "$CONTAINER_NAME"
            exit 1
